{% extends "base.html" %}

{% block content %}
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <p class="sidebar-label">Main</p>
      <ul class="sidebar-nav">
        <li>
          <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">
            <span class="nav-icon">📊</span> Dashboard
          </a>
        </li>
        <li>
          <a href="{{ url_for('services') }}" class="{{ 'active' if request.endpoint in ['services','edit_service'] }}">
            <span class="nav-icon">⚙️</span> Services
          </a>
        </li>
        <li>
          <a href="{{ url_for('add_service') }}" class="{{ 'active' if request.endpoint == 'add_service' }}">
            <span class="nav-icon">➕</span> Add Service
          </a>
        </li>
      </ul>
    </div>
    <div class="sidebar-section">
      <p class="sidebar-label">Account</p>
      <ul class="sidebar-nav">
        <li>
          <a href="{{ url_for('profile') }}" class="{{ 'active' if request.endpoint == 'profile' }}">
            <span class="nav-icon">👤</span> Profile
          </a>
        </li>
        <li>
          <a href="{{ url_for('logout') }}">
            <span class="nav-icon">🚪</span> Logout
          </a>
        </li>
      </ul>
    </div>
  </aside>
  <main class="main-content">
    {% block app_content %}{% endblock %}
  </main>
</div>
{% endblock %}
