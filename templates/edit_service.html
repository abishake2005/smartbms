{% extends "app_base.html" %}
{% block title %}Edit Service — SmartBMS{% endblock %}

{% block app_content %}
<div class="page-header">
  <h1>Edit Service</h1>
  <p>Update the details for <strong>{{ service['service_name'] }}</strong>.</p>
</div>

<div class="card" style="max-width:540px;">
  <form method="POST">
    <div class="form-group">
      <label for="service_name">Service Name</label>
      <input type="text" id="service_name" name="service_name" value="{{ service['service_name'] }}" required>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description">{{ service['description'] or '' }}</textarea>
    </div>
    <div class="form-group">
      <label for="price">Price (USD)</label>
      <input type="number" id="price" name="price" value="{{ service['price'] }}" step="0.01" min="0" required>
    </div>
    <div class="flex gap-2" style="margin-top:0.5rem;">
      <button type="submit" class="btn btn-primary">Update Service</button>
      <a href="{{ url_for('services') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
