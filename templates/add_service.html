{% extends "app_base.html" %}
{% block title %}Add Service — SmartBMS{% endblock %}

{% block app_content %}
<div class="page-header">
  <h1>Add Service</h1>
  <p>Create a new service offering for your business.</p>
</div>

<div class="card" style="max-width:540px;">
  <form method="POST">
    <div class="form-group">
      <label for="service_name">Service Name</label>
      <input type="text" id="service_name" name="service_name" placeholder="e.g. Web Design" required>
    </div>
    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" placeholder="Describe what this service includes..."></textarea>
    </div>
    <div class="form-group">
      <label for="price">Price (USD)</label>
      <input type="number" id="price" name="price" placeholder="0.00" step="0.01" min="0" required>
    </div>
    <div class="flex gap-2" style="margin-top:0.5rem;">
      <button type="submit" class="btn btn-primary">Save Service</button>
      <a href="{{ url_for('services') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
